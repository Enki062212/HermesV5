# Hermes + Exponify Unified Platform - Docker Compose

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════
  # Frontend - Vite React App
  # ═══════════════════════════════════════════════════════════════════════
  hermes-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # Use 'production' for prod builds
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_URL=http://localhost:5055
    command: npm run dev -- --host 0.0.0.0

  # ═══════════════════════════════════════════════════════════════════════
